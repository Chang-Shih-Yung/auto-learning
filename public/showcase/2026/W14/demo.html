<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PermissionDenied Hook × 操作守門員模擬器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fdfcfa;
    color: #1a1a18;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
    min-height: 480px;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #1a1a18;
  }

  .subtitle {
    font-size: 11px;
    color: #6b6b68;
    margin-bottom: 14px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .panel {
    background: #f5f4f1;
    border-radius: 8px;
    padding: 12px;
    border: 1px solid #e8e6e0;
  }

  .panel h2 {
    font-size: 11px;
    font-weight: 600;
    color: #6b6b68;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .rule-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .rule-label {
    font-family: monospace;
    font-size: 11px;
    background: #fff;
    border: 1px solid #dbd9d3;
    border-radius: 4px;
    padding: 3px 7px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  select.rule-action {
    font-size: 11px;
    padding: 3px 6px;
    border: 1px solid #dbd9d3;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    color: #1a1a18;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn-run {
    width: 100%;
    margin-top: 12px;
    padding: 8px;
    background: #3d6b5e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-run:hover { background: #325a4e; }
  .btn-run:disabled { background: #9ab5ae; cursor: not-allowed; }

  .btn-reset {
    width: 100%;
    margin-top: 6px;
    padding: 6px;
    background: transparent;
    color: #6b6b68;
    border: 1px solid #dbd9d3;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .btn-reset:hover { border-color: #3d6b5e; color: #3d6b5e; }

  .log-area {
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 5px;
    font-family: monospace;
    font-size: 11px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .log-entry.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .log-entry.allow {
    background: #edf7f3;
    border: 1px solid #b8e0d0;
    color: #2a6b4e;
  }

  .log-entry.block {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #991b1b;
  }

  .log-entry.retry {
    background: #fefce8;
    border: 1px solid #fde047;
    color: #854d0e;
  }

  .log-entry.info {
    background: #f0f4ff;
    border: 1px solid #bfcff7;
    color: #3730a3;
  }

  .log-icon {
    flex-shrink: 0;
    font-size: 12px;
    line-height: 1.4;
  }

  .log-content {
    flex: 1;
    min-width: 0;
    line-height: 1.4;
  }

  .log-cmd {
    font-weight: 600;
  }

  .log-note {
    opacity: 0.75;
    font-size: 10px;
    display: block;
  }

  .empty-log {
    color: #9a9894;
    font-size: 11px;
    text-align: center;
    padding: 20px 0;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .stat {
    flex: 1;
    text-align: center;
    padding: 6px;
    border-radius: 5px;
    font-size: 11px;
  }

  .stat-num {
    font-size: 18px;
    font-weight: 700;
    display: block;
    line-height: 1.2;
  }

  .stat.allow { background: #edf7f3; color: #2a6b4e; }
  .stat.retry { background: #fefce8; color: #854d0e; }
  .stat.block { background: #fef2f2; color: #991b1b; }

  .legend {
    margin-top: 10px;
    font-size: 10px;
    color: #9a9894;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>🔐 PermissionDenied Hook × 操作守門員模擬器</h1>
<p class="subtitle">Claude Code auto mode 遇到每個操作時，hook 決定：允許 / 拒絕 / 拒絕後重試</p>

<div class="layout">
  <!-- Rules Panel -->
  <div class="panel">
    <h2>規則設定</h2>
    <div id="rules-list"></div>
    <button class="btn-run" id="run-btn" onclick="runAgent()">▶ 執行 Agent</button>
    <button class="btn-reset" onclick="resetAll()">↺ 重置</button>
    <div class="legend">
      ✅ 允許：操作通過<br>
      ↺ 拒絕+重試：hook 回傳 {retry:true}，agent 換方式再試<br>
      ✗ 拒絕：操作中止，session 等待確認
    </div>
  </div>

  <!-- Log Panel -->
  <div class="panel">
    <h2>執行日誌</h2>
    <div class="log-area" id="log-area">
      <div class="empty-log" id="empty-hint">點擊「執行 Agent」開始模擬...</div>
    </div>
    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat allow"><span class="stat-num" id="stat-allow">0</span>允許</div>
      <div class="stat retry"><span class="stat-num" id="stat-retry">0</span>重試</div>
      <div class="stat block"><span class="stat-num" id="stat-block">0</span>拒絕</div>
    </div>
  </div>
</div>

<script>
  const OPERATIONS = [
    { cmd: "WebFetch ollama.com/blog", desc: "讀取 Ollama 發布說明" },
    { cmd: "git add journal/", desc: "暫存日誌檔案" },
    { cmd: "git commit -m 'daily: ...'", desc: "建立 commit" },
    { cmd: "git push origin main", desc: "推送到遠端" },
    { cmd: "rm -rf node_modules/", desc: "刪除依賴目錄" },
    { cmd: "npm install axios@1.14.1", desc: "安裝套件（含惡意版本）" },
    { cmd: "Read memory/session-log.md", desc: "讀取 session 記錄" },
    { cmd: "Write journal/2026/03/...", desc: "寫入日誌檔案" },
  ];

  const DEFAULT_RULES = [
    { pattern: "WebFetch", action: "allow" },
    { pattern: "git add", action: "allow" },
    { pattern: "git commit", action: "allow" },
    { pattern: "git push", action: "retry" },
    { pattern: "rm -rf", action: "block" },
    { pattern: "npm install axios@1.14.1", action: "block" },
    { pattern: "Read", action: "allow" },
    { pattern: "Write", action: "allow" },
  ];

  let rules = DEFAULT_RULES.map(r => ({ ...r }));
  let isRunning = false;

  function renderRules() {
    const list = document.getElementById("rules-list");
    list.innerHTML = rules.map((rule, i) => `
      <div class="rule-row">
        <span class="rule-label">${rule.pattern}</span>
        <select class="rule-action" onchange="rules[${i}].action = this.value">
          <option value="allow" ${rule.action === 'allow' ? 'selected' : ''}>✅ 允許</option>
          <option value="retry" ${rule.action === 'retry' ? 'selected' : ''}>↺ 重試</option>
          <option value="block" ${rule.action === 'block' ? 'selected' : ''}>✗ 拒絕</option>
        </select>
      </div>
    `).join('');
  }

  function findRule(cmd) {
    for (const rule of rules) {
      if (cmd.includes(rule.pattern)) return rule.action;
    }
    return "allow";
  }

  function appendLog(entry) {
    const area = document.getElementById("log-area");
    const hint = document.getElementById("empty-hint");
    if (hint) hint.remove();

    const el = document.createElement("div");
    el.className = `log-entry ${entry.type}`;
    el.innerHTML = `
      <span class="log-icon">${entry.icon}</span>
      <span class="log-content">
        <span class="log-cmd">${entry.cmd}</span>
        <span class="log-note">${entry.note}</span>
      </span>
    `;
    area.appendChild(el);
    // trigger animation
    requestAnimationFrame(() => {
      requestAnimationFrame(() => el.classList.add("visible"));
    });
    area.scrollTop = area.scrollHeight;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function runAgent() {
    if (isRunning) return;
    isRunning = true;
    document.getElementById("run-btn").disabled = true;

    const area = document.getElementById("log-area");
    area.innerHTML = '';
    document.getElementById("stats-row").style.display = "none";

    let countAllow = 0, countRetry = 0, countBlock = 0;

    appendLog({
      type: "info",
      icon: "🤖",
      cmd: "Agent session 啟動",
      note: "PermissionDenied hook 已掛載，開始處理操作佇列..."
    });

    await sleep(400);

    for (const op of OPERATIONS) {
      const action = findRule(op.cmd);
      await sleep(350);

      if (action === "allow") {
        countAllow++;
        appendLog({
          type: "allow",
          icon: "✅",
          cmd: op.cmd,
          note: `${op.desc} → hook 允許通過`
        });
      } else if (action === "retry") {
        countRetry++;
        appendLog({
          type: "retry",
          icon: "↺",
          cmd: op.cmd,
          note: `${op.desc} → hook 回傳 {retry:true}，agent 換方式重試`
        });
        await sleep(300);
        appendLog({
          type: "allow",
          icon: "✅",
          cmd: op.cmd + " [重試]",
          note: "第二次嘗試通過"
        });
      } else {
        countBlock++;
        appendLog({
          type: "block",
          icon: "✗",
          cmd: op.cmd,
          note: `${op.desc} → 操作被拒絕，session 暫停等待確認`
        });
      }
    }

    await sleep(300);
    appendLog({
      type: "info",
      icon: "📋",
      cmd: "Session 結束",
      note: `允許 ${countAllow} / 重試 ${countRetry} / 拒絕 ${countBlock}`
    });

    document.getElementById("stat-allow").textContent = countAllow;
    document.getElementById("stat-retry").textContent = countRetry;
    document.getElementById("stat-block").textContent = countBlock;
    document.getElementById("stats-row").style.display = "flex";

    isRunning = false;
    document.getElementById("run-btn").disabled = false;
  }

  function resetAll() {
    rules = DEFAULT_RULES.map(r => ({ ...r }));
    renderRules();
    const area = document.getElementById("log-area");
    area.innerHTML = '<div class="empty-log" id="empty-hint">點擊「執行 Agent」開始模擬...</div>';
    document.getElementById("stats-row").style.display = "none";
  }

  renderRules();
</script>
</body>
</html>
